{% if messages %}
<div class="toast toast-top toast-center z-100 mt-4">
  {% for message in messages %}
  <div
    x-data="{ show: true }"
    x-init="$nextTick(() => { setTimeout(() => show = false, 1500) })"
  >
    <template x-if="show">
      <div
        x-transition.duration.300ms
        class="alert bg-base-100 shadow-xl rounded-2xl flex items-start gap-3 px-6 py-4 border {% if 'success' in message.tags %} border-success text-success {% elif 'error' in message.tags %} border-error text-error {% elif 'warning' in message.tags %} border-warning text-warning {% else %} border-info text-info {% endif %}"
      >
        {% if 'success' in message.tags %}
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="stroke-current shrink-0 h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>

        {% elif 'error' in message.tags %}
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="stroke-current shrink-0 h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>

        {% elif 'warning' in message.tags %}
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="stroke-current shrink-0 h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
          />
        </svg>

        {% else %}
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="stroke-current shrink-0 h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
        {% endif %}

        <span class="font-medium text-sm flex-1 text-base-content"
          >{{ message }}</span
        >

        <button
          @click="show = false"
          class="btn btn-ghost btn-xs btn-circle text-base-content/50 hover:text-base-content"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>
    </template>
  </div>
  {% endfor %}
</div>
{% endif %}
