<li id="group-{{ group.id }}"
		x-data="{ curr_group_id: '{{ group.id }}',
		          editing: false}"
    class="bg-base-100 rounded-lg shadow-sm border border-base-200 hover:border-primary-content transition-colors"
    :class="editing ? 'bg-base-200 border-transparent' : 'bg-base-100 shadow-sm border-base-200 hover:border-primary-content'">
	<!--------------- VIEW MODE -------------->
	<div x-show="!editing"
			 class="flex items-center justify-between p-4">

		<span class="text-lg font-medium">{{ group.name }}</span>

		<div class="flex gap-2">
			<!-- Open inline Edit mode button, on click add current group id to ui state in alpine store,
					 also focus the edit group name input field -->
			<button @click="editing=true;
			                $store.group_ui.start_edit(curr_group_id);
			                $nextTick(() => $refs.editNameInput.focus());"
							:disabled="$store.group_ui.editGroupId && $store.group_ui.editGroupId !== curr_group_id"
			        :class="$store.group_ui.editGroupId && $store.group_ui.editGroupId !== curr_group_id ? 'opacity-50 pointer-events-none' : '' "
							class="btn btn-sm btn-ghost btn-square text-info" type="button">
				<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
        </svg>
			</button>
			<!-- Delete button -->
			<button class="btn btn-sm btn-ghost btn-square text-error" type="button"
							:disabled="$store.group_ui.editGroupId && $store.group_ui.editGroupId !== curr_group_id"
			        :class="$store.group_ui.editGroupId && $store.group_ui.editGroupId !== curr_group_id ? 'opacity-50 pointer-events-none' : '' "
							hx-delete="{% url 'notes:group_delete_page' group.id %}"
							hx-target="#group-{{ group.id }}"
			        hx-swap="outerHTML"
							hx-confirm="Are you sure you want to delete '{{ group.name }}'?">
				<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
        </svg>
			</button>
		</div>
	</div>

	<!-------------- EDITING MODE --------------->
	<div x-show="editing" x-cloak
			 class="p-4 bg-base-200 rounded-lg shadow-inner">

		<form hx-post="{% url 'notes:group_edit_page' group.id %}"
	        hx-target="#group-{{ group.id }}"
	        hx-swap="outerHTML"
		      @htmx:after-request="editing = false; if($event.detail.successful) $store.group_ui.stop_edit();"
	        class="flex items-center gap-4">
		  {% csrf_token %}

	    <label for="group-name-input-{{ group.id }}" class="sr-only">Group Name</label>
	    <!-- edit name input -->
	    <input x-ref="editNameInput" id="group-name-input-{{ group.id }}" type="text" name="name"
	           value="{{ group.name }}" required
	           class="input input-secondary font-semibold flex-1">

	    <!-- right buttons : submit and cancel -->
	    <div class="flex items-center gap-2 shrink-0">
	      <button type="submit" class="btn btn-soft btn-secondary">
	        Save
	      </button>

	      <button @click="editing=false; $store.group_ui.stop_edit()" type="button"
	              class="btn btn-soft btn-accent">
	        Cancel
	      </button>
	    </div>
	  </form>
	</div>
</li>
