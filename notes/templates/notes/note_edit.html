{% extends 'notes/dashboard_base.html' %}

{% block main %}
{# main note form, its input fields are linked below	#}
<form method="post" id="note_form">
	{% csrf_token %}
</form>
<!-- top navbar -->
<div class="bg-base-200 w-full flex flex-col md:flex-row items-center gap-4 p-4 rounded-xl shadow-sm hover:shadow-md focus:shadow-md">
	<div class="flex flex-col sm:flex-row items-center w-full md:w-auto md:flex-1 min-w-0 gap-2">
		<label for="note_title" class="sr-only">Title</label>
    <input id="note_title" type="text" name="title" form="note_form" value="{{ note.title }}"
           placeholder="Enter note title"
           class="input input-ghost text-primary text-lg font-bold focus:outline-none focus:ring-0 border-none flex-1 min-w-0" />
		<div class="divider divider-horizontal hidden sm:flex mx-0"></div>
		<label for="note_group" class="sr-only">Group</label>
		<select form="note_form" id="note_group" name="group"
		        class="select select-ghost text-secondary focus:outline-none focus:ring-0 border-none shrink-0 max-w-[40%]">
		  <option value="" {% if not note.group %} selected {% endif %}>No Group</option>
      {% for group in groups %}
        <option value="{{ group.id }}" {% if note.group_id == group.id %} selected {% endif %}>
          {{ group.name }}
        </option>
      {% endfor %}
		</select>
	</div>

	<div class="flex items-center justify-around md:justify-end w-full md:w-auto gap-3 shrink-0">
		{% include 'notes/partial_star_button.html' with note=note %}

		<button form="note_form" type="submit" formaction="{% url 'notes:note_edit_page' note.id %}"
		        class="btn btn-primary">
			Save
		</button>
	</div>
</div>

<!-- main body content -->
<textarea
				x-data
        @keydown.tab.prevent="$el.setRangeText('    ', $el.selectionStart, $el.selectionStart, 'end')"
				id="new_note_body" form="note_form" name="raw_content"
				placeholder="Body text from backend"
				class="mt-4 textarea textarea-ghost h-screen w-full flex resize-none p-2 font-mono focus:outline-none focus:ring-0 border-none">
{{ note.raw_content }}
</textarea>

{% endblock main %}
