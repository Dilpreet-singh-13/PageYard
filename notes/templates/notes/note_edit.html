{% extends 'notes/dashboard_base.html' %}

{% block main %}
{# main note form, its input fields are linked below	#}
<form method="post" id="note_form">
	{% csrf_token %}
</form>
<!-- top navbar -->
<div class="navbar bg-base-200">
	<div class="navbar-start space-x-4">
		<label for="note_title" class="sr-only">Title</label>
    <input id="note_title" type="text" name="title" form="note_form" value="{{ note.title }}"
           placeholder="Enter note title"
           class="input input-ghost input-primary text-lg font-bold focus:outline-none focus:ring-0 border-none" />
		<div class="divider divider-horizontal"></div>
		<label for="note_group" class="sr-only">Group</label>
		<select form="note_form" id="note_group" name="group"
		        class="select select-ghost focus:outline-none focus:ring-0 border-none text-base-content">
		  <option value="" disabled {% if not note.group %} selected {% endif %}>No Group</option>
      {% for group in groups %}
        <option value="{{ group.id }}" {% if note.group_id == group.id %} selected {% endif %}>
          {{ group.name }}
        </option>
      {% endfor %}
		</select>
	</div>

	<div class="navbar-end mr-2 space-x-4">
		{#	TODO: toggle button acc to starred or not, also htmx view to toggle star	#}
		<button class="btn btn-square btn-ghost {{ note.is_starred|yesno:'text-yellow-400,' }}">
	    <svg xmlns="http://www.w3.org/2000/svg" fill="{{ note.is_starred|yesno:'currentColor,none' }}" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="size-[1.2em]">
		    <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
	    </svg>
		</button>

		<button form="note_form" type="submit" formaction="{% url 'notes:note_edit_page' note.id %}"
		        class="btn btn-primary">Save</button>
	</div>
</div>

<!-- main body content -->
<textarea
				x-data
        @keydown.tab.prevent="$el.setRangeText('    ', $el.selectionStart, $el.selectionStart, 'end')"
				id="new_note_body" form="note_form" name="raw_content"
				placeholder="Body text from backend"
				class="mt-4 textarea textarea-ghost h-screen w-full flex resize-none p-2 font-mono focus:outline-none focus:ring-0 border-none">
{{ note.raw_content }}
</textarea>

{% endblock main %}
